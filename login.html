<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Access your StoryTail account. Manage your bookings, activity downloads, and newsletter preferences.">
    <title>Login | StoryTail Member Access</title>
    <link rel="icon" href="assets/images/author.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-light);
            padding: 2rem;
            position: relative;
        }

        .auth-card {
            background: var(--bg-white);
            padding: 3rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            max-width: 450px;
            width: 100%;
            box-shadow: var(--shadow-md);
            text-align: center;
            position: relative;
        }

        .auth-header {
            margin-bottom: 2.5rem;
            position: relative;
        }

        .logo {
            font-size: 1.8rem;
            display: inline-flex;
            margin-bottom: 0.5rem;
        }

        .theme-toggle-fixed {
            position: absolute;
            top: 2rem;
            right: 2rem;
            z-index: 100;
        }

        .theme-toggle {
            background: var(--bg-white);
            border: 1px solid var(--border);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .social-btns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn-social {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-light);
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-social:hover {
            background: var(--bg-white);
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .divider {
            margin: 1.5rem 0;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        @media (max-width: 400px) {
            .social-btns {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-light);
            color: var(--text-main);
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }

        .auth-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
            transition: var(--transition);
        }

        .auth-footer a:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .auth-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>

<body data-theme="light">
    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-blob"></div>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle-fixed">
        <button class="theme-toggle" aria-label="Toggle Theme">
            <i class="ri-moon-line"></i>
        </button>
    </div>

    <section class="auth-container">
        <!-- Decorative Blobs -->
        <div class="blob-bg"
            style="width: 400px; height: 400px; top: -100px; right: -100px; background: var(--secondary);"></div>
        <div class="blob-bg" style="width: 300px; height: 300px; bottom: -50px; left: -50px; background: var(--mint);">
        </div>

        <div class="auth-card">
            <header class="auth-header">
                <a href="index.html" class="logo"><i class="ri-sparkling-fill"></i> Story<span>Tail</span></a>
                <p style="color: var(--text-muted);">Welcome back!</p>
            </header>

            <form action="#" method="POST">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="reader@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                    <div style="text-align: right; margin-top: 0.5rem;">
                        <a href="#" style="font-size: 0.8rem; color: var(--primary);">Forgot Password?</a>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; padding: 1rem; border-radius: var(--radius-sm);">
                    Login Now
                </button>
            </form>

            <div class="divider">or use social</div>

            <div class="social-btns">
                <button class="btn-social">
                    <i class="ri-google-fill" style="color: #4285F4;"></i> Google
                </button>
                <button class="btn-social">
                    <i class="ri-facebook-fill" style="color: #1877F2;"></i> Facebook
                </button>
                <button class="btn-social">
                    <i class="ri-apple-fill" style="color: var(--text-main);"></i> Apple
                </button>
            </div>

            <div class="auth-footer">
                <p>New here? <a href="register.html">Sign Up</a></p>
            </div>
        </div>
    </section>

    <script src="assets/js/main.js"></script>
</body>

</html>
